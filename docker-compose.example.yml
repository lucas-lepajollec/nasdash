services:
  nasdash:
    image: lucas/nasdash:latest # Replace with your image or build: .
    container_name: nasdash
    ports:
      - "2504:2504"
    pid: "host"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=2504
    depends_on:
      - docker-proxy
    restart: unless-stopped

  docker-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: nasdash-docker-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - VOLUMES=1
      - NETWORKS=1
      - INFO=1
      - POST=1
      - AUTH=0
      - BUILD=0
      - EXEC=0
      - SYSTEM=0
    restart: unless-stopped
